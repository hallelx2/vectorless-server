# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: vectorless-server

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: vectorless-server
    main: ./cmd/server/main.go
    binary: vectorless-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: vectorless-server
    builds:
      - vectorless-server
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

dockers:
  - id: vectorless-server-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/hallelx2/vectorless-server:{{ .Version }}-amd64"
      - "ghcr.io/hallelx2/vectorless-server:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/hallelx2/vectorless-server"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

  - id: vectorless-server-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/hallelx2/vectorless-server:{{ .Version }}-arm64"
      - "ghcr.io/hallelx2/vectorless-server:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/hallelx2/vectorless-server"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

docker_manifests:
  - name_template: "ghcr.io/hallelx2/vectorless-server:{{ .Version }}"
    image_templates:
      - "ghcr.io/hallelx2/vectorless-server:{{ .Version }}-amd64"
      - "ghcr.io/hallelx2/vectorless-server:{{ .Version }}-arm64"

  - name_template: "ghcr.io/hallelx2/vectorless-server:latest"
    image_templates:
      - "ghcr.io/hallelx2/vectorless-server:latest-amd64"
      - "ghcr.io/hallelx2/vectorless-server:latest-arm64"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Performance"
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "Other"
      order: 999

release:
  github:
    owner: hallelx2
    name: vectorless-server
  prerelease: auto
  name_template: "v{{ .Version }}"
